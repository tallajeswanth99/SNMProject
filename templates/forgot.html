<!DOCTYPE html>
<html lang="en">
<head>

    <title>Forgot Password</title>
</head>
<body>
    <center>Forgot password</center>
    {% with messages = get_flashed_messages() %}

    {% for message in messages %}

  {% endif %}
{% endwith %}
     <center>

        <button>submit</button>
     </form>
     
     </center>
</body>
</html>
