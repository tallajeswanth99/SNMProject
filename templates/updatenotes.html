{% extends "dashboard.html" %}
{% block addcss %}
<link rel="stylesheet" href="/static/addnotes.css">{% endblock %}
{% block content %}

<div class="add-notes-container">

    <div class="notes-card">

        <h2>Update Note</h2>

        <form method="POST">

            <!-- TITLE -->

            <div class="form-group">
                <label for="title">Title</label>

                <input type="text" id="title" name="title" value="{{storednotesdata[1]}}" required>
            </div>

            <!-- DESCRIPTION -->

            <div class="form-group">
                <label for="description">Description</label>

                <textarea id="description" name="description" rows="8" required>{{storednotesdata[2]}}</textarea>
            </div>

            <!-- BUTTON -->

            <button type="submit" class="save-btn">
                Update Note
            </button>

        </form>

    </div>

</div>

{% endblock %}
