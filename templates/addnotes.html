{% extends "dashboard.html" %}
{% block addcss %}
<link rel="stylesheet" href="/static/addnotes.css">{% endblock %}
{% block content %}

<div class="add-notes-container">

    <div class="notes-card">

        <h2>Add New Note</h2>

        <form action="" method="POST">

            <!-- TITLE -->

            <div class="form-group">
                <label for="title">Title</label>

                <input type="text" id="title" name="title" placeholder="Enter note title" required>
            </div>

            <!-- DESCRIPTION -->

            <div class="form-group">
                <label for="description">Description</label>

                <textarea id="description" name="description" rows="8" placeholder="Write your note here..."
                    required></textarea>
            </div>

            <!-- BUTTON -->

            <button type="submit" class="save-btn">
                Save Note
            </button>

        </form>

    </div>

</div>

{% endblock %}
