{% extends "dashboard.html" %}
{% block addcss %}
<link rel="stylesheet" href="/static/viewallnotes.css">{% endblock %}
{% block content %}


<div class="notes-table-container">

    <div class="table-card">
        <table>

            <thead>
                <tr>
                    <th>File ID</th>
                    <th>Filename</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% if allfilesdata %}
                {% for i in allfilesdata %}
                <tr>
                    <td>{{i[0]}}</td>

                    <td>{{i[1]}}</td>

                    <td>{{i[2]}}</td>

                    <td class="actions">

                        <!-- VIEW -->

                        <a href="{{url_for('viewfile',fid=i[0])}}" class="view-btn">
                            View
                        </a>

                        <!-- UPDATE -->

                        <a href="{{url_for('downloadfile',fid=i[0])}}" class="update-btn">
                            Download
                        </a>

                        <!-- DELETE -->

                        <a href="#" class="delete-btn"
                            onclick="return confirm('Are you sure you want to delete this note?')">
                            Delete
                        </a>

                    </td>
                </tr>
                {% endfor %}
                {% endif %}


            </tbody>

        </table>

    </div>

</div>

{% endblock %}
